<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1698/1698535.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1698/1698535.png">
    <link rel="manifest" href="manifest.json">

    <title>Kimi AI - Chat Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🤖 Kimi AI</h1>
            <p class="subtitle">Todos los modelos de Moonshot AI</p>
        </header>

        <nav class="model-selector">
            <div class="selector-group">
                <label for="modelSelect">Modelo:</label>
                <select id="modelSelect" class="model-select">
                    <!-- K2.5 (Enero 2026) -->
                    <optgroup label="🔥 K2.5 (Multimodal 2026)">
                        <option value="moonshotai/Kimi-K2.5" selected>Kimi K2.5 - 1T Multimodal</option>
                        <option value="moonshotai/Kimi-K2.5-Instruct">K2.5 Instruct - Chat</option>
                        <option value="moonshotai/Kimi-K2.5-Thinking">K2.5 Thinking - Razonamiento</option>
                        <option value="moonshotai/Kimi-K2.5-Agent">K2.5 Agent - Autónomo</option>
                        <option value="moonshotai/Kimi-K2.5-Swarm">K2.5 Swarm - Multiagente</option>
                    </optgroup>
                    
                    <!-- K2 (Julio 2025) -->
                    <optgroup label="⚡ K2 (Texto y código)">
                        <option value="moonshotai/Kimi-K2">Kimi K2 Base</option>
                        <option value="moonshotai/Kimi-K2-Instruct">K2 Instruct</option>
                        <option value="moonshotai/Kimi-K2-Instruct-0905">K2 Instruct 0905</option>
                        <option value="moonshotai/Kimi-K2-Thinking">K2 Thinking</option>
                    </optgroup>
                    
                    <!-- Especializados -->
                    <optgroup label="🧠 Especializados">
                        <option value="moonshotai/Kimi-VL">Kimi-VL (Visión)</option>
                        <option value="moonshotai/Kimi-VL-Thinking">Kimi-VL Thinking</option>
                        <option value="moonshotai/Kimi-Dev">Kimi-Dev (Código 72B)</option>
                        <option value="moonshotai/Kimi-Researcher">Kimi-Researcher</option>
                    </optgroup>
                    
                    <!-- Eficientes -->
                    <optgroup label="⚡ Eficientes">
                        <option value="moonshotai/Kimi-Linear-48B">Kimi Linear 48B</option>
                        <option value="moonshotai/Kimi-Linear-A3B">Kimi Linear A3B</option>
                        <option value="moonshotai/Moonlight-3B">Moonlight 3B</option>
                        <option value="moonshotai/Moonlight-16B">Moonlight 16B MoE</option>
                    </optgroup>
                </select>
            </div>
            <button onclick="limpiarHistorial()" class="btn-clear">
                <span class="btn-icon">🗑️</span>
                <span class="btn-text">Limpiar</span>
            </button>
        </nav>

        <main class="chat-container" id="chatContainer"></main>

        <footer class="input-area">
            <textarea 
                id="userInput" 
                rows="1" 
                placeholder="Escribe tu mensaje..."
                enterkeyhint="send"
            ></textarea>
            <button id="sendBtn" aria-label="Enviar">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
