<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kimi Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h3>🤖 Kimi Chat</h3>
        </header>

        <div class="controls">
            <select id="modelSelect">
                <option value="meta/llama-3.1-8b-instruct">Kimi Lite</option>
                <option value="meta/llama-3.1-70b-instruct">Kimi Pro</option>
            </select>
            <button onclick="localStorage.clear(); location.reload();">🗑️</button>
        </div>

        <div id="chatBox" class="chat-area"></div>

        <div class="input-box">
            <input type="text" id="userInput" placeholder="Escribe un mensaje..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
