<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1698/1698535.png">
    <link rel="manifest" href="manifest.json">

    <title>Kimi Chat Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🤖 Kimi Chat</h1>
            <p>Powered by NVIDIA AI</p>
        </header>

        <nav class="model-selector">
            <div class="selector-group">
                <label for="modelSelect">IA:</label>
                <select id="modelSelect">
                    <option value="meta/llama-3.1-8b-instruct">Kimi Lite (Rápido)</option>
                    <option value="meta/llama-3.1-70b-instruct">Kimi Pro (Potente)</option>
                    <option value="nvidia/llama-3.1-405b-instruct">Kimi Ultra (Máximo)</option>
                </select>
            </div>
            <button onclick="limpiarHistorial()" class="btn-clear">🗑️ Limpiar</button>
        </nav>

        <main class="chat-container" id="chatContainer"></main>

        <footer class="input-area">
            <textarea id="userInput" rows="1" placeholder="Pídeme una App o escribe algo..."></textarea>
            <button id="sendBtn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
