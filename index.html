<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Kimi AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="main-header">
            <h3>🤖 Kimi Chat</h3>
        </header>

        <div class="top-bar">
            <select id="modelSelect" style="flex:1; padding:5px;">
                <option value="meta/llama-3.1-8b-instruct">Kimi Lite</option>
                <option value="meta/llama-3.1-70b-instruct">Kimi Pro</option>
            </select>
            <button onclick="clearChat()">🗑️</button>
        </div>

        <main id="chatBox" class="chat-viewport" style="display:flex; flex-direction:column;"></main>

        <footer class="input-container">
            <textarea id="userInput" placeholder="Escribe aquí..."></textarea>
            <button id="sendBtn">➤</button>
        </footer>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
